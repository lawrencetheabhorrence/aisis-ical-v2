name: Scraper

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  run_scraper:
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: 3.13
    - name: Install Dependencies
      run: |
        uv install
    - name: Run Scraper Script
      run: |
        cd scripts
        python3 ./scraper.py
